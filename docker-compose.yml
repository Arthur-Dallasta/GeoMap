services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: geomap
      POSTGRES_PASSWORD: geomap
      POSTGRES_DB: geomap
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geomap -d geomap"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
