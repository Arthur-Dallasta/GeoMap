services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: geomap
      POSTGRES_PASSWORD: geomap
      POSTGRES_DB: geomap
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geomap -d geomap"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://geomap:geomap@db:5432/geomap
      SECRET_KEY: troque-me-em-producao
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
